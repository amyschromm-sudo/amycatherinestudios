<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Mayor — Amy Catherine Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #000; --white: #fff; --gold: #c9a96e; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; font-weight: 200; background: var(--black); color: var(--white); cursor: none; overflow-x: hidden; }
  .cursor { position: fixed; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); mix-blend-mode: difference; }

  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 2rem 3rem; }
  .nav-left { display: flex; align-items: center; gap: 1rem; }
  .nav-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.3); }
  .nav-name { font-size: 0.65rem; letter-spacing: 0.3em; color: var(--white); text-transform: uppercase; }
  .nav-back { font-size: 0.65rem; letter-spacing: 0.3em; color: rgba(255,255,255,0.6); text-decoration: none; text-transform: uppercase; transition: color 0.3s; }
  .nav-back:hover { color: var(--gold); }

  .hero-still { position: relative; height: 100vh; overflow: hidden; }
  .hero-still img { width: 100%; height: 100%; object-fit: cover; object-position: center center; filter: brightness(1); }
  .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.55)); }
  .hero-text { position: absolute; bottom: 10%; left: 3rem; }
  .hero-label { font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; display: block; }
  .hero-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(3rem, 7vw, 7rem); color: var(--white); letter-spacing: 0.05em; line-height: 1; display: block; }
  .hero-tagline { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.9); margin-top: 1rem; display: block; }

  /* VIDEO STRIP */
  .video-strip { position: relative; width: 100%; height: 70vh; overflow: hidden; }
  .video-strip iframe { position: absolute; top: 50%; left: 50%; width: 177.78vh; height: 100%; min-width: 100%; transform: translate(-50%, -50%); pointer-events: none; }

  /* LANDSCAPE GRID */
  .stills-landscape { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 2px; }
  .stills-landscape.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .still-land { overflow: hidden; aspect-ratio: 3/2; cursor: pointer; }
  .still-land img { width: 100%; height: 100%; object-fit: cover; object-position: center center; filter: brightness(0.9); transition: transform 0.7s ease, filter 0.5s ease; }
  .still-land:hover img { transform: scale(1.03); filter: brightness(1); }

  /* PORTRAIT GRID */
  .stills-portrait { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 2px; }
  .still-port { overflow: hidden; aspect-ratio: 2/3; cursor: pointer; }
  .still-port img { width: 100%; height: 100%; object-fit: cover; object-position: center top; filter: brightness(0.9); transition: transform 0.7s ease, filter 0.5s ease; }
  .still-port:hover img { transform: scale(1.03); filter: brightness(1); }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  .lightbox-close { position: absolute; top: 2rem; right: 2rem; color: var(--white); cursor: pointer; font-size: 0.7rem; letter-spacing: 0.2em; }
  .lightbox-prev, .lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); font-size: 0.65rem; letter-spacing: 0.2em; cursor: pointer; padding: 1rem; }
  .lightbox-prev { left: 2rem; }
  .lightbox-next { right: 2rem; }

  .credits { padding: 6rem 3rem; border-top: 1px solid rgba(255,255,255,0.08); }
  .credits-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem; margin-top: 3rem; }
  .credit-label { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; display: block; }
  .credit-value { font-size: 0.8rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.7); }

  .next-project { padding: 5rem 3rem; text-decoration: none; border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-between; align-items: center; transition: opacity 0.3s; }
  .next-project:hover { opacity: 0.7; }
  .next-label { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); display: block; margin-bottom: 0.5rem; }
  .next-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: clamp(1.5rem, 3vw, 2.5rem); color: var(--white); }
  .next-arrow { font-size: 2rem; color: var(--gold); }

  footer { padding: 3rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.08); }
  .f-right { font-size: 0.55rem; letter-spacing: 0.2em; color: rgba(255,255,255,0.3); text-align: right; line-height: 1.8; }


  .nav-name { display: none; }
  .hero-text { left: 1.5rem; bottom: 8%; }
  .hero-title { font-size: clamp(2.5rem, 12vw, 4rem); }
  .hero-tagline { font-size: 0.7rem; letter-spacing: 0.2em; }
  .film-section { padding: 3rem 1.5rem; }
  .video-strip { height: 40vw; min-height: 200px; }
  .stills-full, .stills-landscape, .stills-portrait, .stills-row { grid-template-columns: repeat(2, 1fr) !important; }
  .still-port { aspect-ratio: 3/4; }
  .credits { padding: 3rem 1.5rem; }
  .credits-grid { grid-template-columns: 1fr !important; gap: 1.5rem; }
  .next-project { padding: 3rem 1.5rem; }
  footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; text-align: center; }
}


@media (max-width: 768px) {
  nav { padding: 1rem 1.5rem; }
  .nav-name { display: none; }
  .hero-text { left: 1.5rem; right: 1.5rem; bottom: 8%; }
  .hero-title { font-size: clamp(2rem, 10vw, 3.5rem); }
  .hero-tagline { font-size: 0.65rem; letter-spacing: 0.15em; }
  .film-section { padding: 2.5rem 1.5rem; }
  .credits { padding: 2.5rem 1.5rem; }
  .credits-grid { grid-template-columns: 1fr; gap: 1.2rem; }
  .next-project { padding: 2.5rem 1.5rem; }
  footer { padding: 1.5rem; flex-direction: column; gap: 0.8rem; text-align: center; }
  .video-strip { height: 56vw; }
}

</style>
</head>
<body>

<div class="cursor" id="cur"></div>

<nav>
  <div class="nav-left">
    <div class="nav-divider"></div>
    <span class="nav-name">Amy Catherine Studios</span>
  </div>
  <a href="index.html" class="nav-back">← Back</a>
</nav>

<!-- HERO — _7 rooftop laughing still from index -->
<div class="hero-still">
  <img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_7_chxrf5.jpg" alt="El Mayor">
  <div class="hero-overlay"></div>
  <div class="hero-text">
    <span class="hero-label">Campaign · Spirits</span>
    <span class="hero-title">El Mayor</span>
    <span class="hero-tagline">Sun-kissed and alive.</span>
  </div>
</div>

<!-- VIDEO STRIP -->
<div class="video-strip">
  <iframe src="https://player.vimeo.com/video/943037545?autoplay=1&loop=1&muted=1&background=1&title=0&byline=0&portrait=0" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<!-- LANDSCAPE ROW: 10, 3, 15 -->
<div class="stills-landscape" style="margin-top:2px;">
  <div class="still-land"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_10_tdjaar.jpg" alt="El Mayor" style="object-position:center center;"></div>
  <div class="still-land"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_3_h0jjcn.jpg" alt="El Mayor" style="object-position:center center;"></div>
  <div class="still-land"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_15_pvdqg0.jpg" alt="El Mayor" style="object-position:center center;"></div>
</div>

<!-- LANDSCAPE ROW: gujctl, 11 -->
<div class="stills-landscape cols-2">
  <div class="still-land"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_gujctl.jpg" alt="El Mayor" style="object-position:center center;"></div>
  <div class="still-land"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_11_lv7u9t.jpg" alt="El Mayor" style="object-position:center center;"></div>
</div>

<!-- _6 landscape + _2 portrait side by side -->
<div style="display:grid; grid-template-columns: 2fr 1fr; gap:2px; margin-top:2px;">
  <div class="still-land"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_6_dporb2.jpg" alt="El Mayor" style="object-position:center center;"></div>
  <div class="still-port"><img src="https://res.cloudinary.com/dcamhwuif/image/upload/amy_schromm_el_mayor_2_oi7isb.jpg" alt="El Mayor" style="object-position:center top;"></div>
</div>

<!-- CREDITS -->
<div class="credits">
  <div class="credits-grid">
    <div><span class="credit-label">Director & Photographer</span><span class="credit-value">Amy Schromm</span></div>
    <div><span class="credit-label">Client</span><span class="credit-value">El Mayor Tequila</span></div>
    <div><span class="credit-label">Studio</span><span class="credit-value">Amy Catherine Studios</span></div>
  </div>
</div>

<a href="woodford.html" class="next-project">
  <div>
    <span class="next-label">Next Project</span>
    <span class="next-title">Woodford Reserve</span>
  </div>
  <span class="next-arrow">→</span>
</a>

<footer>
  <div><span style="font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:rgba(255,255,255,0.4);">ACS</span></div>
  <div class="f-right">DBA ACS Productions LLC<br>© 2026 All Rights Reserved</div>
</footer>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lbClose">CLOSE ✕</span>
  <span class="lightbox-prev" id="lbPrev">← PREV</span>
  <img id="lbImg" src="" alt="">
  <span class="lightbox-next" id="lbNext">NEXT →</span>
</div>

<script>
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => { cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px'; });

const allImgs = Array.from(document.querySelectorAll('.still-land img, .still-port img'));
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
let current = 0;
allImgs.forEach((img, i) => {
  img.addEventListener('click', () => { current = i; lbImg.src = img.src; lb.classList.add('active'); });
});
document.getElementById('lbClose').addEventListener('click', () => lb.classList.remove('active'));
document.getElementById('lbPrev').addEventListener('click', () => { current = (current - 1 + allImgs.length) % allImgs.length; lbImg.src = allImgs[current].src; });
document.getElementById('lbNext').addEventListener('click', () => { current = (current + 1) % allImgs.length; lbImg.src = allImgs[current].src; });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') lb.classList.remove('active');
  if (e.key === 'ArrowLeft') { current = (current - 1 + allImgs.length) % allImgs.length; lbImg.src = allImgs[current].src; }
  if (e.key === 'ArrowRight') { current = (current + 1) % allImgs.length; lbImg.src = allImgs[current].src; }
});
</script>
</body>
</html>
